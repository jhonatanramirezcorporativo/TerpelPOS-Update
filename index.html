<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TerpelPOS — Actualizaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      --c-bg:       #f5f5f7;
      --c-surface:  #ffffff;
      --c-border:   #e2e2e7;
      --c-text:     #1d1d1f;
      --c-muted:    #6e6e73;
      --c-accent:   #d62b00;       /* Terpel rojo */
      --c-accent2:  #ff6b35;       /* naranja cálido */
      --c-green:    #30a46c;
      --c-yellow:   #e59c0a;
      --c-blue:     #0a6dbd;
      --c-purple:   #7c3aed;
      --c-danger:   #c0392b;
      --c-shadow:   0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --c-shadow-lg:0 8px 32px rgba(0,0,0,.12);
      --r:          12px;
      --r-sm:       8px;
      --font:       'Inter', system-ui, sans-serif;
      --mono:       'JetBrains Mono', monospace;
      --transition: .18s cubic-bezier(.4,0,.2,1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --c-bg:      #0d0d0f;
        --c-surface: #1a1a1e;
        --c-border:  #2c2c31;
        --c-text:    #f0f0f5;
        --c-muted:   #8a8a91;
        --c-shadow:  0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
        --c-shadow-lg:0 8px 32px rgba(0,0,0,.5);
      }
    }
    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    /* ─────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────── */
    .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: .5rem; }
    .gap-3 { gap: .75rem; }
    .gap-4 { gap: 1rem; }
    .ml-auto { margin-left: auto; }
    .truncate { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    /* ─────────────────────────────────────────
       LOADING OVERLAY
    ───────────────────────────────────────── */
    #app-loading {
      position: fixed; inset: 0; background: var(--c-bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 1rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--c-border);
      border-top-color: var(--c-accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { font-size: .875rem; color: var(--c-muted); }
    /* ─────────────────────────────────────────
       LOGIN PAGE
    ───────────────────────────────────────── */
    #login-page {
      display: none;
      min-height: 100vh;
